<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>200 Stars For Hugo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro">

    <h1>Happy Birthday Hugo ✨</h1>

    <p>
        I collected 200 stars for you.
    </p>


<div id="bottle">

<svg
    id="bottleSvg"
    viewBox="0 0 300 450"
    xmlns="http://www.w3.org/2000/svg">

    <!-- Cork -->

    <rect
        x="120"
        y="20"
        width="60"
        height="35"
        rx="6"
        fill="#c9a26a"/>

    <!-- Neck -->

    <rect
        x="125"
        y="50"
        width="50"
        height="90"
        rx="8"
        fill="rgba(255,255,255,.08)"
        stroke="rgba(255,255,255,.25)"
        stroke-width="2"/>

    <!-- Bottle Body -->

    <path
        id="glassBody"
        d="
        M80 130
        Q80 80 130 80
        L170 80
        Q220 80 220 130
        L220 320
        Q220 400 150 400
        Q80 400 80 320
        Z"
        fill="rgba(255,255,255,.08)"
        stroke="rgba(255,255,255,.25)"
        stroke-width="2"/>

    <!-- Glass Highlight -->

    <path
        d="
        M105 110
        Q90 180 105 320"
        stroke="rgba(255,255,255,.18)"
        stroke-width="8"
        stroke-linecap="round"
        fill="none"/>

</svg>

<div id="bottleStars"></div>

</div>
    
    <button id="openBottle">
        Open the Bottle
    </button>

</div>

<div id="starField"></div>

<div id="messageModal" class="hidden">

    <div class="card">

        <span id="closeModal">✕</span>

        <h2 id="starNumber"></h2>

        <p id="starMessage"></p>

    </div>

</div>

<script src="script.js"></script>

<div id="counter">
    0 / 200 Stars Found
</div>
    

</body>
</html>
