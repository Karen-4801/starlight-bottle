<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>200 Stars For Hugo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro">

    <h1>Happy Birthday Hugo ✨</h1>

    <p>
        I collected 200 stars for you.
    </p>


<div id="bottle">
    
<svg
    id="bottleSvg"
    viewBox="0 0 400 500"
    xmlns="http://www.w3.org/2000/svg">

    <defs>

        <clipPath id="bottleClip">

            <path d="
                M130 120

                Q130 80 165 80
                L235 80
                Q270 80 270 120

                Q340 150 340 250

                L340 380

                Q340 460 200 460

                Q60 460 60 380

                L60 250

                Q60 150 130 120

                Z
            "/>

        </clipPath>

        <linearGradient id="glassGradient"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop
                offset="0%"
                stop-color="rgba(255,255,255,.18)"/>

            <stop
                offset="100%"
                stop-color="rgba(255,255,255,.04)"/>

        </linearGradient>

    </defs>

    <!-- Cork -->

    <rect
        x="145"
        y="15"
        width="110"
        height="45"
        rx="10"
        fill="#c49b63"/>

    <!-- Glass Ring -->

    <ellipse
    cx="200"
    cy="115"
    rx="58"
    ry="10"

    fill="none"
    stroke="rgba(255,255,255,.35)"
    stroke-width="4"/>

    <!-- Neck -->

    <rect
        x="155"
        y="55"
        width="90"
        height="60"

        fill="rgba(255,255,255,.08)"
        stroke="rgba(255,255,255,.25)"
        stroke-width="2"/>

    <!-- Main Body -->

    <path
        d="
            M130 120

            Q130 80 165 80
            L235 80
            Q270 80 270 120

            Q340 150 340 250

            L340 380

            Q340 460 200 460

            Q60 460 60 380

            L60 250

            Q60 150 130 120

            Z
        "

        fill="rgba(255,255,255,.08)"
        stroke="rgba(255,255,255,.25)"
        stroke-width="3"/>

    <!-- Large Highlight -->

    <path
        d="
            M110 170

            Q90 250 105 390
        "

        stroke="rgba(255,255,255,.25)"
        stroke-width="12"
        stroke-linecap="round"
        fill="none"/>

    <!-- Small Highlight -->

    <path
        d="
            M285 180

            Q300 250 290 340
        "

        stroke="rgba(255,255,255,.08)"
        stroke-width="6"
        stroke-linecap="round"
        fill="none"/>

</svg>

<div id="bottleStars"></div>

</div>
    
    <button id="openBottle">
        Open the Bottle
    </button>

</div>

<div id="starField"></div>

<div id="messageModal" class="hidden">

    <div class="card">

        <span id="closeModal">✕</span>

        <h2 id="starNumber"></h2>

        <p id="starMessage"></p>

    </div>

</div>

<script src="script.js"></script>

<div id="counter">
    0 / 200 Stars Found
</div>
    

</body>
</html>
